controller:
  image:
    repository: wallarm/ingress-controller
    tag: 1.0.0-dev
    digest: null

  service:
    type: ClusterIP

  kind: Deployment

  podAnnotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "10254"
    prometheus.io/scheme: http
    prometheus.io/path: /metrics

  wallarm:
    apiHost: api.wallarm.com
